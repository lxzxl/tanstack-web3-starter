name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Format check (oxfmt)
        run: pnpm format:check

      - name: Contract tests (Hardhat 3)
        run: pnpm test

      # Build first — it runs codegen and generates the route tree, which the
      # typecheck depends on (both are gitignored, generated artifacts).
      - name: Build (codegen + SSR)
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck
