name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Contract tests (Hardhat 3)
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build (codegen + SSR)
        run: pnpm build
